    .search-box:focus { outline: none; border-color: #1f6feb; }

    .group-title { font-size: 14px; font-weight: 700; color: #334155; margin: 14px 0 8px; }
    .or-divider { text-align: center; color: #aab2c0; font-size: 12px; margin: 16px 0 6px; }
    .scenario-row { display: flex; gap: 10px; }
    .scenario-btn {
      flex: 1; padding: 16px 10px; border: 2px solid #d8dee9; border-radius: 14px;
      background: #fff; font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s;
    }
    .scenario-btn .emoji { display: block; font-size: 26px; margin-bottom: 4px; }
    .scenario-btn.active { border-color: #1f6feb; background: #eaf2ff; color: #1f6feb; }
    select {
      width: 100%; padding: 14px; font-size: 16px; border: 2px solid #d8dee9; border-radius: 12px;
      background: #fff; color: #1c2333; appearance: none;

      background-repeat: no-repeat; background-position: right 14px center;
    }
    .results { margin-top: 8px; }
    .card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #e6e9f0; position: relative; }
    .card.best { border: 2px solid #16a34a; background: #f0fdf4; }
    .best-badge { position: absolute; top: -10px; left: 14px; background: #16a34a; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .card-name { font-size: 16px; font-weight: 700; }
    .card-name a { color: #2b56d4; text-decoration: none; border-bottom: 1px dashed #9bb0ec; }
    .card-name a:hover { color: #1b3aa0; border-bottom-style: solid; }
    .card-name a .ext { font-size: 11px; opacity: .7; }
    .card-reward { font-size: 20px; font-weight: 800; color: #16a34a; white-space: nowrap; }
    .card .meta { font-size: 13px; color: #4b5563; margin-top: 6px; }
    .card .meta b { color: #b45309; }
    .card .note { font-size: 12.5px; color: #6b7280; margin-top: 4px; }
    .hint { color: #9aa3b2; font-size: 14px; text-align: center; padding: 28px 0; }
    .updated { text-align: center; font-size: 11px; color: #aab2c0; margin-top: 22px; white-space: pre-line; }

    var curScenario = '', curChannel = '', curStore = '', curSearch = '';

    var dates = ALL.map(function (r) { return r.updated; }).filter(Boolean).sort();
    document.getElementById('updated').textContent =
      '資料更新日期：' + (dates[dates.length - 1] || '—') + '（回饋規則會變動，記得定期請 Claude 更新）';

    function channelsOf(s) { var seen={},list=[]; ALL.forEach(function(r){ if(r.scenario===s&&!seen[r.channel]){seen[r.channel]=1;list.push(r.channel);} }); return list; }
    function scenarios() { var seen={},list=[]; ALL.forEach(function(r){ if(!seen[r.scenario]){seen[r.scenario]=1;list.push(r.scenario);} }); return list; }
    function emojiFor(s){ if(s.indexOf('百大')>-1)return '🏆'; if(s.indexOf('幸福M')>-1)return '🧳'; if(s.indexOf('行動支付')>-1)return '📱'; if(s.indexOf('日本')>-1)return '🗾'; return '💳'; }

    function render() {
      var sc = scenarios();
      var html = '<div class="or-divider">— 或用情境一步步找 —</div>';
      html += '<div class="step-label">第一步：你要做什麼？</div><div class="scenario-row">';
      sc.forEach(function (s) {
        html += '<button class="scenario-btn ' + (s===curScenario?'active':'') + '" onclick="pickScenario(\'' + esc(s) + '\')"><span class="emoji">' + emojiFor(s) + '</span>' + s + '</button>';
      });
      html += '</div>';
      if (curScenario) {
        var chs = channelsOf(curScenario);
        html += '<div class="step-label">第二步：選類別／通路</div><select onchange="pickChannel(this.value)"><option value="">— 請選擇 —</option>';
        chs.forEach(function (c) { html += '<option value="' + esc(c) + '"' + (c===curChannel?' selected':'') + '>' + c + '</option>'; });
        html += '</select>';
        if (curChannel && STORES[curChannel]) {
          html += '<div class="step-label">第三步：選店家（每家最佳卡不同）</div><select onchange="pickStore(this.value)"><option value="">— 請選擇店家 —</option>';
          STORES[curChannel].forEach(function (s) { html += '<option value="' + esc(s) + '"' + (s===curStore?' selected':'') + '>' + s + '</option>'; });
          html += '</select>';
        }
      }
      html += '<div class="results" id="results"></div>';
      document.getElementById('app').innerHTML = html;
      renderResults();
    }

    function renderResults() {
      var box = document.getElementById('results'); if (!box) return;
      if (!curScenario || !curChannel) {
        box.innerHTML = '<div class="hint">' + (curScenario ? '👆 選一個類別／通路就告訴你最高回饋' : '👆 先選上面的情境') + '</div>'; return;
      }
      // 有第三層「店家」的類別：要先選店家，逐店顯示
      if (STORES[curChannel]) {
        if (!curStore) { box.innerHTML = '<div class="hint">👆 選一個店家（每家最佳卡不同）</div>'; return; }
        var srows = (STORE_CARDS[curChannel + '|' + curStore] || []).slice().sort(function(a,b){ return b.value-a.value; });
        var shtml = ''; srows.forEach(function (r, i) { shtml += cardHtml(r, i===0); });
        box.innerHTML = shtml || '<div class="hint">這家店家的資料還在補，先參考類別整體</div>';
        return;
      }
      var m = ALL.filter(function(r){ return r.scenario===curScenario && r.channel===curChannel; }).sort(function(a,b){ return b.value-a.value; });
      var html = '';
      m.forEach(function (r, i) { html += cardHtml(r, i===0); });
      box.innerHTML = html;
    }

    // 共用：把一筆回饋渲染成卡片
    function cardHtml(r, isBest) {
      var html = '<div class="card ' + (isBest ? 'best' : '') + '">';
      if (isBest) html += '<span class="best-badge">★ 最高回饋</span>';
      html += '<div class="card-top"><span class="card-name">' + cardNameHtml(r.card) + '</span><span class="card-reward">' + r.display + '</span></div>';
      if (r.cap) html += '<div class="meta">每期上限：<b>' + r.cap + '</b></div>';
      if (r.note) html += '<div class="note">' + r.note + '</div>';
      html += '</div>';
      return html;

    // 搜尋：打關鍵字 → 找符合的通路/店家，依通路分組顯示最高回饋
    function onSearch(q) {
      curSearch = q;
      var box = document.getElementById('searchResults');
      var app = document.getElementById('app');
      var key = q.trim().toLowerCase();
      if (!key) { box.innerHTML = ''; if (app) app.style.display = ''; return; }
      if (app) app.style.display = 'none';
      var matches = ALL.filter(function (r) {
        return (r.scenario + ' ' + r.channel + ' ' + r.card + ' ' + r.note).toLowerCase().indexOf(key) > -1;
      });
      if (!matches.length) {
        box.innerHTML = '<div class="hint">找不到「' + escHtml(q) + '」😅 換個關鍵字試試（例如店家名、通路名）</div>';
        return;
      }
      var groups = {}, order = [];
      matches.forEach(function (r) {
        var gk = r.scenario + '｜' + r.channel;
        if (!groups[gk]) { groups[gk] = []; order.push(gk); }
        groups[gk].push(r);
      });
      var html = '<div class="step-label">🔍 搜尋「' + escHtml(q) + '」：' + order.length + ' 個通路／店家</div>';
      order.forEach(function (gk) {
        var rows = groups[gk].slice().sort(function (a, b) { return b.value - a.value; });
        var p = gk.split('｜');
        html += '<div class="search-group"><div class="group-title">' + emojiFor(p[0]) + ' ' + p[0] + ' ・ ' + p[1] + '</div>';
        rows.forEach(function (r, i) { html += cardHtml(r, i === 0); });
        html += '</div>';
      });
      box.innerHTML = html;
    }

    function pickScenario(s){ curScenario=s; curChannel=''; curStore=''; render(); }
    function pickChannel(c){ curChannel=c; curStore=''; render(); }
    function pickStore(s){ curStore=s; renderResults(); }
    function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
    function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    render();
  </script>
</body>
</html>
